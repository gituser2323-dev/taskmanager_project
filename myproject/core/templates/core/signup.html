<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .signup-container{
            background:white;
            padding:30px;
            width:320px;
            border-radius:10px;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#111827;
        }

        label{
            font-size:14px;
            color:#374151;
            font-weight:500;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #e5e7eb;
            border-radius:6px;
            outline:none;
            transition:0.2s;
        }

        input:focus{
            border-color:#4F46E5;
            box-shadow:0 0 0 2px rgba(79,70,229,0.1);
        }

        button{
            width:100%;
            padding:10px;
            background:#4F46E5;
            color:white;
            border:none;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            background:#4338CA;
        }

        p{
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }

        a{
            color:#4F46E5;
            text-decoration:none;
            font-weight:500;
        }

        a:hover{
            text-decoration:underline;
        }
    </style>

</head>
<body>

<div class="signup-container">

<h2>Signup</h2>

<form method="POST">
    {% csrf_token %}

    <label>Username</label>
    <input type="text" name="username" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <button type="submit">Signup</button>
</form>

<p>Already have account? 
    <a href="{% url 'login' %}">Login</a>
</p>

</div>

</body>
</html>
