{% extends "core/base.html" %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'core/editTask.css' %}">
<style>

.container {
    max-width: 600px;
    margin: 30px auto;
    background: #fff;
    padding: 25px 30px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    transition: all 0.3s ease;
}

.container:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}


form {
    display: flex;
    flex-direction: column;
}

label {
    margin-top: 15px;
    margin-bottom: 5px;
    font-weight: 500;
    color: #333;
}

input[type="text"], input[type="date"], textarea, select {
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 1rem;
    transition: all 0.3s ease;
}

input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #6366F1;
    box-shadow: 0 0 5px rgba(99,102,241,0.3);
}

textarea {
    resize: vertical;
    min-height: 80px;
}


.row {
    display: flex;
    gap: 15px;
    margin-top: 15px;
}

.row .col {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.buttons {
    display: flex;
    justify-content: flex-end;
    margin-top: 20px;
    gap: 10px;
}

button.save {
    background: #10B981;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.3s ease;
}

button.save:hover {
    background: #059669;
    transform: scale(1.05);
}

button.cancel {
    background: #EF4444;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.3s ease;
}

button.cancel:hover {
    background: #DC2626;
    transform: scale(1.05);
}

@media screen and (max-width: 480px) {
    .row {
        flex-direction: column;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="container">

    <form method="POST">
        {% csrf_token %}

        <label>Assigned To *</label>
        <input type="text" name="assigned_to" value="{{ data.assigned_to }}" placeholder="e.g. Rahul" required>

        <label>Update Title *</label>
        <input type="text" name="title" value="{{ data.title }}" placeholder="e.g. Design homepage" required>

        <label>Update Description</label>
        <textarea name="description" placeholder="What needs to be done?">{{ data.description }}</textarea>

        <label>Update Due Date</label>
        <input type="date" name="due_date" value="{{ data.due_date|date:'Y-m-d' }}">

        <div class="row">
            <div class="col">
                <label>Update Priority</label>
                <select name="priority">
                    <option value="Low" {% if data.priority == "Low" %}selected{% endif %}>Low</option>
                    <option value="Medium" {% if data.priority == "Medium" %}selected{% endif %}>Medium</option>
                    <option value="High" {% if data.priority == "High" %}selected{% endif %}>High</option>
                </select>
            </div>

            <div class="col">
                <label>Update Status</label>
                <select name="status">
                    <option value="Pending" {% if data.status == "Pending" %}selected{% endif %}>Pending</option>
                    <option value="In Progress" {% if data.status == "In Progress" %}selected{% endif %}>In Progress</option>
                    <option value="Completed" {% if data.status == "Completed" %}selected{% endif %}>Completed</option>
                </select>
            </div>
        </div>

        <div class="buttons">
            <button type="submit" class="save">Update Task</button>
            <button type="button" class="cancel" onclick="window.history.back()">Cancel</button>
        </div>

    </form>
</div>
{% endblock %}
