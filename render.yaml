services:
  - type: web
    name: team-work-manager
    env: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate

    startCommand: gunicorn myproject.wsgi:application

    envVars:
      - key: DEBUG
        value: "False"

      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        value: "*"

      - key: DATABASE_URL
        fromDatabase:
          name: team-work-db
          property: connectionString

databases:
  - name: team-work-db
    databaseName: teamworkdb
    user: teamworkuser